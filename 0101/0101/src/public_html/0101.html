    <script onkeypress="keyPress()" id="SELECTION" onloadeddata="save()" onload="save()" >
      var sec = "Spinward Marches";
      var sub = "A Cronor";
      var sys = "0101";
      var _fetchGen = 0;  // incremented on each SecChange to cancel stale fetches

      // worldsCache["sector:subsector"] -> [{hex, name}, ...]
      var worldsCache = {};
      // subsectorLetters["sector:subsector"] -> letter ("A".."P")
      var subsectorLetters = {};

      // Pre-seed Spinward Marches subsector letter map
      var SM_SUBS = [
        {l:"A",n:"Cronor"},{l:"B",n:"Jewell"},{l:"C",n:"Regina"},{l:"D",n:"Aramis"},
        {l:"E",n:"Querion"},{l:"F",n:"Vilis"},{l:"G",n:"Lanth"},{l:"H",n:"Rhylanor"},
        {l:"I",n:"Darrian"},{l:"J",n:"Sword Worlds"},{l:"K",n:"Lunion"},
        {l:"L",n:"Mora"},{l:"M",n:"Five Sisters"},{l:"N",n:"District 268"},
        {l:"O",n:"Glisten"},{l:"P",n:"Trin's Veil"}
      ];
      SM_SUBS.forEach(function(s) {
        subsectorLetters["Spinward Marches:" + s.l + " " + s.n] = s.l;
      });

      // Parse tab-delimited sec data (Sector, SS, Hex, Name, ...)
      function parseSecTabDelimited(text) {
        var worlds = [];
        text.split('\n').forEach(function(line) {
          line = line.trim();
          if (!line || line.charAt(0) === '#') return;
          var parts = line.split('\t');
          if (parts.length < 4) return;
          var hex = parts[2].trim();
          var name = parts[3].trim();
          if (hex === 'Hex' || !/^\d+$/.test(hex)) return;
          worlds.push({hex: hex, name: name});
        });
        return worlds;
      }

      // Load Spinward Marches world list from static JSON, then initialise display
      fetch('./TXT/worlds-by-subsector.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          Object.keys(data).forEach(function(label) {
            worldsCache['Spinward Marches:' + label] = data[label];
          });
          console.log('worldsCache seeded for Spinward Marches');
          _restoreState();
        })
        .catch(function(err) {
          console.warn('worlds-by-subsector.json not found, will fetch on demand:', err);
          _restoreState();
        });

      function _restoreState() {
        var savedSec = localStorage.getItem('sec');
        var savedSub = localStorage.getItem('sub');
        if (savedSec) {
          document.getElementById('Sector').value = savedSec;
          sec = savedSec;
        }
        // If saved sector differs from Spinward Marches, the subsector list
        // needs refreshing — let SecChange handle it via fetchAndLoadSubsectors.
        // Otherwise just restore sub directly.
        if (sec !== 'Spinward Marches') {
          fetchAndLoadSubsectors(sec, savedSub);
          return;
        }
        if (savedSub) {
          document.getElementById('Subsector').value = savedSub;
          sub = savedSub;
        }
        populateSysList(sec, sub);
        var savedHexJSON = localStorage.getItem('hexJSON');
        var savedHex = savedHexJSON ? JSON.parse(savedHexJSON).hex : null;
        if (savedHex) {
          var sysEl = document.getElementById('Sys');
          for (var i = 0; i < sysEl.options.length; i++) {
            if (sysEl.options[i].value === savedHex) { sysEl.selectedIndex = i; break; }
          }
        }
        save();
        load();
      }

      function Startup() {
        console.log('Startup()');
        save();
      }
    </script>

    <!-- Sector Change -->
    <script>
      function SecChange() {
        sec = document.getElementById('Sector').value;
        console.log('SecChange() sec =', sec);
        localStorage.setItem('sec', sec);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        fetchAndLoadSubsectors(sec, null);
      }

      // Fetch subsector names from TravellerMap metadata API, repopulate
      // Subsector dropdown, then trigger SubChange.
      // restoreSub: if provided and found in new list, pre-select it.
      function fetchAndLoadSubsectors(sector, restoreSub) {
        var myGen = ++_fetchGen;
        fetch('https://travellermap.com/api/metadata?sector=' + encodeURIComponent(sector))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (myGen !== _fetchGen) return;
            var subs = (data.Subsectors || []).slice().sort(function(a, b) {
              return a.Index < b.Index ? -1 : 1;
            });
            var subEl = document.getElementById('Subsector');
            subEl.innerHTML = '';
            subs.forEach(function(s) {
              var label = s.Index + ' ' + s.Name;
              subsectorLetters[sector + ':' + label] = s.Index;
              var opt = document.createElement('option');
              opt.value = label;
              opt.text = label;
              subEl.appendChild(opt);
            });
            console.log('Subsector list loaded for', sector, ':', subs.length, 'subsectors');
            if (restoreSub && subEl.querySelector('option[value="' + restoreSub + '"]')) {
              subEl.value = restoreSub;
            }
            SubChange();
          })
          .catch(function(err) {
            if (myGen !== _fetchGen) return;
            console.warn('fetchAndLoadSubsectors failed:', err);
            SubChange();
          });
      }
    </script>
    <!-- Subsector Change -->
    <script>
      function SubChange() {
        sub = document.getElementById('Subsector').value;
        console.log('SubChange() sub =', sub);
        localStorage.setItem('sub', sub);

        var cacheKey = sec + ':' + sub;
        if (worldsCache[cacheKey]) {
          populateSysList(sec, sub);
          SysChange();
          return;
        }

        // Fetch from TravellerMap API (async)
        var myGen = _fetchGen;
        var letter = subsectorLetters[cacheKey] || sub.charAt(0);
        var url = 'https://travellermap.com/api/sec?sector=' + encodeURIComponent(sec)
                  + '&subsector=' + encodeURIComponent(letter) + '&type=TabDelimited';
        fetch(url)
          .then(function(r) { return r.text(); })
          .then(function(text) {
            if (myGen !== _fetchGen) return;
            worldsCache[cacheKey] = parseSecTabDelimited(text);
            console.log('Fetched', worldsCache[cacheKey].length, 'worlds for', cacheKey);
            populateSysList(sec, sub);
            SysChange();
          })
          .catch(function(err) {
            if (myGen !== _fetchGen) return;
            console.warn('SubChange: world fetch failed:', err);
            populateSysList(sec, sub);
            SysChange();
          });
      }

      function populateSysList(sector, subsectorLabel) {
        var sysEl = document.getElementById('Sys');
        var worlds = worldsCache[sector + ':' + subsectorLabel];
        sysEl.innerHTML = '';
        if (!worlds || worlds.length === 0) {
          var opt = document.createElement('option');
          opt.value = '';
          opt.text = '(loading...)';
          sysEl.appendChild(opt);
          return;
        }
        worlds.forEach(function(w) {
          var opt = document.createElement('option');
          opt.value = w.hex;
          opt.text = w.hex + ' ' + w.name;
          sysEl.appendChild(opt);
        });
        console.log('populateSysList:', sector, subsectorLabel, worlds.length, 'worlds');
      }
    </script>
