        <script>
          function exportSystemData() {
            var sys = document.getElementById("Sys").value;
            var data = { system: sys, info: "(details to be loaded here)" };
            var blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = sys + "_info.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }

          function importOverlayFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
              try {
                var data = JSON.parse(e.target.result);
                alert("Overlay imported (placeholder): " + JSON.stringify(data));
              } catch (err) {
                alert("Invalid JSON file.");
              }
            };
            reader.readAsText(file);
          }
        </script>
