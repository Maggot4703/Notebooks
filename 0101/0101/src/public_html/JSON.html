    <!-- demo -->
    <script name="Who()" id="Who">
      //Who();
      function Who() {
        console.log("Who");
        who = {name: "Carl Anderson"};
        whoJSON = JSON.stringify(who);
        localStorage.setItem("whoJSON", whoJSON);

        // Retrieving data:
        text = localStorage.getItem("whoJSON");
        json = JSON.parse(text);
        document.getElementById("demo0").innerHTML = json.name;
        console.log("" + json.name);
      }
    </script>    <!-- Who-->
